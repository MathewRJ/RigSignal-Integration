---
description: >
  Ingest pipeline for RigSignal per-thread eBPF scheduler metrics.
processors:
  - set:
      field: "@timestamp"
      value: "{{{_ingest.timestamp}}}"
      if: "ctx['@timestamp'] == null"

  - script:
      description: "Validate session ID is present"
      lang: painless
      source: |
        def sid = ctx.rigsignal?.session?.id;
        if (sid == null || sid.isEmpty()) {
          throw new Exception('rigsignal.session.id is required in eBPF thread documents');
        }

on_failure:
  - set:
      field: _ingest.pipeline_error
      value: "{{_ingest.on_failure_message}}"
  - set:
      field: _ingest.failed_pipeline
      value: "rigsignal-ebpf-thread"
