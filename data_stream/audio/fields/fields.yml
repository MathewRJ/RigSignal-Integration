# ECS fields used in this data stream
- name: host.name
  external: ecs
  dimension: true

# Session context
- name: rigsignal
  type: group
  fields:
    - name: session
      type: group
      fields:
        - name: id
          type: keyword
          dimension: true
          description: "Unique session identifier (UUID)"
        - name: agent_version
          type: keyword
          description: "Version of the RigSignal collector agent"
        - name: label
          type: keyword
          description: "Optional user-supplied annotation for this session (e.g. 'after-driver-update')"

    - name: game
      type: group
      fields:
        - name: name
          type: keyword
          description: "Game title"
        - name: steam_app_id
          type: long
          description: "Steam application ID (present only when source == steam)"
        - name: source
          type: keyword
          description: "Detection source: steam | lutris | heroic | bottles | epic_games | gog_galaxy | user_specified | auto_detected"
        - name: launcher
          type: keyword
          description: "Human-readable launcher name (e.g. Steam, Lutris, Heroic — Epic, Epic Games, GOG Galaxy)"

    # Audio-specific metrics
    - name: audio
      type: group
      fields:
        - name: backend
          type: keyword
          description: "Audio server backend (pipewire, pulseaudio, alsa, wasapi)"
        - name: sample_rate_hz
          type: integer
          metric_type: gauge
          description: "Effective PipeWire clock rate (or PulseAudio server rate on that backend) in Hz"
        - name: quantum
          type: integer
          metric_type: gauge
          description: "effective PipeWire scheduling quantum in frames, from pw-metadata"
        - name: latency_ms
          type: float
          metric_type: gauge
          unit: ms
          description: "Configured scheduling latency in milliseconds"
        - name: sink_name
          type: keyword
          description: "Default audio sink name, from pactl."
        - name: card_profile
          type: keyword
          description: "Active card profile of the default sink, from pactl."
        - name: channels
          type: integer
          metric_type: gauge
          description: "Channel count of the default sink, from pactl."
        - name: sample_format
          type: keyword
          description: "Sample format of the default sink, from pactl."
        - name: driver_latency_ms
          type: float
          metric_type: gauge
          unit: ms
          description: "Default sink's actual driver latency in ms, 2 dp, from pactl."
