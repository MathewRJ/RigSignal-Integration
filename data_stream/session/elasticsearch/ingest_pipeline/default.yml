---
description: >
  Ingest pipeline for RigSignal session documents.
  Sets @timestamp, validates required identification fields, and normalises
  hardware vendor strings. Fired once at session start and once at session end.
processors:
  - set:
      field: "@timestamp"
      value: "{{{_ingest.timestamp}}}"
      if: "ctx['@timestamp'] == null"

  - script:
      description: "Validate required session identification fields are present"
      lang: painless
      source: |
        def sid = ctx.rigsignal?.session?.id;
        if (sid == null || sid.isEmpty()) {
          throw new Exception('rigsignal.session.id is required');
        }
        def name = ctx.rigsignal?.game?.name;
        if (name == null || name.isEmpty()) {
          throw new Exception('rigsignal.game.name is required');
        }

  - lowercase:
      field: rigsignal.hardware.gpu.vendor
      ignore_missing: true
      description: "Normalise GPU vendor (AMD -> amd, NVIDIA -> nvidia)"

  - lowercase:
      field: rigsignal.game.graphics_api
      ignore_missing: true

  - trim:
      field: rigsignal.game.name
      ignore_missing: true

  - lowercase:
      field: host.os.type
      ignore_missing: true
      description: "Normalise OS type (Linux -> linux, Windows -> windows)"

on_failure:
  - set:
      field: _ingest.pipeline_error
      value: "{{_ingest.on_failure_message}}"
  - set:
      field: _ingest.failed_pipeline
      value: "rigsignal-session"
