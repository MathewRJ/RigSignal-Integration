---
description: >
  Ingest pipeline for RigSignal Stream Client metrics.
  Sets @timestamp and validates GPU utilization gauges.
processors:
  - set:
      field: "@timestamp"
      value: "{{{_ingest.timestamp}}}"
      if: "ctx['@timestamp'] == null"

  - trim:
      field: rigsignal.game.name
      ignore_missing: true

  - script:
      description: "Validate stream client utilization gauges are 0-100%"
      lang: painless
      source: |
        def video = ctx.rigsignal?.stream?.client?.video_busy_pct;
        if (video != null && (video < 0 || video > 100)) {
          throw new Exception('rigsignal.stream.client.video_busy_pct must be 0-100, got: ' + video);
        }
        def gfx = ctx.rigsignal?.stream?.client?.gfx_busy_pct;
        if (gfx != null && (gfx < 0 || gfx > 100)) {
          throw new Exception('rigsignal.stream.client.gfx_busy_pct must be 0-100, got: ' + gfx);
        }

on_failure:
  - set:
      field: _ingest.pipeline_error
      value: "{{_ingest.on_failure_message}}"
  - set:
      field: _ingest.failed_pipeline
      value: "rigsignal-stream_client"
