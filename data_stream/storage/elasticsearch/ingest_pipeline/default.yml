---
description: >
  Ingest pipeline for RigSignal storage metrics.
  Sets @timestamp and validates throughput/IOPS values are non-negative.
processors:
  - set:
      field: "@timestamp"
      value: "{{{_ingest.timestamp}}}"
      if: "ctx['@timestamp'] == null"

  - trim:
      field: rigsignal.game.name
      ignore_missing: true

  - script:
      description: "Validate storage metrics are non-negative"
      lang: painless
      source: |
        def readMbps = ctx.rigsignal?.storage?.read_mbps;
        if (readMbps != null && readMbps < 0) {
          throw new Exception('rigsignal.storage.read_mbps must be >= 0');
        }

on_failure:
  - set:
      field: _ingest.pipeline_error
      value: "{{_ingest.on_failure_message}}"
  - set:
      field: _ingest.failed_pipeline
      value: "rigsignal-storage"
