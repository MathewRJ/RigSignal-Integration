---
description: >
  Ingest pipeline for RigSignal discrete events (logs type).
  Sets @timestamp, validates required event fields, and maps to ECS event fields.
  This is a logs data stream — events are not periodic measurements.
processors:
  - set:
      field: "@timestamp"
      value: "{{{_ingest.timestamp}}}"
      if: "ctx['@timestamp'] == null"

  - trim:
      field: rigsignal.game.name
      ignore_missing: true

  - script:
      description: "Validate legacy event fields and set ECS event.kind"
      lang: painless
      source: |
        if (ctx.rigsignal?.stream?.client?.event == null) {
          def kind = ctx.rigsignal?.event?.kind;
          if (kind == null || kind.isEmpty()) {
            throw new Exception('rigsignal.event.kind is required');
          }
          // Map to ECS event.kind
          if (ctx.event == null) ctx.event = [:];
          ctx.event.kind = 'event';
          // Map severity to ECS
          def severity = ctx.rigsignal?.event?.severity;
          if (severity == 'error' || severity == 'critical') {
            ctx.event.type = ['error'];
          } else {
            ctx.event.type = ['info'];
          }
        }

  - lowercase:
      field: rigsignal.event.kind
      ignore_missing: true

  - lowercase:
      field: rigsignal.event.severity
      ignore_missing: true

on_failure:
  - set:
      field: _ingest.pipeline_error
      value: "{{_ingest.on_failure_message}}"
  - set:
      field: _ingest.failed_pipeline
      value: "rigsignal-events"
