version: 0.2.0
format_version: "3.0.0"
name: rigsignal
title: "RigSignal"
description: >
  Gaming telemetry for Elastic: FPS, GPU/CPU metrics, frame timing percentiles,
  and kernel-level scheduler, I/O, and GPU fence tracing via eBPF.
  Understand why games perform the way they do — down to scheduler migrations and
  shader compilation stutters.
type: integration
categories:
  - monitoring
  - observability
conditions:
  kibana:
    version: "^8.13.0 || ^9.0.0"
  elastic:
    subscription: basic
owner:
  github: MathewRJ
  type: community
icons:
  - src: img/icon.svg
    title: RigSignal
    type: image/svg+xml

policy_templates:
  - name: rigsignal
    title: RigSignal Gaming Telemetry
    description: >
      Collect gaming performance metrics and kernel telemetry via eBPF.
      Covers CPU, GPU, frame timing, memory, storage, network, audio, power,
      session lifecycle, discrete events, and scheduler/I/O/GPU kernel probes.
    inputs:
      - type: filestream
        title: RigSignal Spool Files
        description: >
          Tail NDJSON spool files written by rigsignal-agent in spool-file output
          mode. Configure the same path as [output] spool_dir in rigsignal.toml.
          Not needed when the agent runs in direct-to-Elasticsearch mode.
        vars:
          - name: paths
            type: text
            title: Spool directory glob
            description: >
              Path glob matching rigsignal spool files. Must match [output] spool_dir
              in rigsignal.toml. Default covers the system-service path.
            multi: true
            required: true
            default:
              - /var/lib/rigsignal/spool/*.ndjson
