- version: "0.4.0"
  changes:
    - description: >
        Add the stream_client metrics dataset for Steam Remote Play client GPU stream
        utilization; augment events with Remote Play connection documents and conditional
        pipeline pass-through; and catch audio mappings up with quantum and pactl sink
        fields while removing xruns and buffer_size.
      type: enhancement
      link: https://github.com/MathewRJ/RigSignal-Integration/issues/5
- version: "0.3.1"
  changes:
    - description: >
        Fix: add streams section to all 12 data stream manifests so Fleet can discover
        the filestream template for each dataset. Without this Fleet returned
        "Stream template not found" when enabling non-events streams in a policy.
      type: bugfix
      link: https://github.com/MathewRJ/RigSignal-Integration/issues/4
- version: "0.3.0"
  changes:
    - description: >
        Phase 4.1: refactor filestream templates to per-dataset spool file paths
        (rigsignal-{slug}-*.ndjson). Fixes 12x duplication from combined spool file.
        Manifest vars: paths (multi) replaced by spool_dir (single string).
      type: enhancement
      link: https://github.com/MathewRJ/RigSignal-Integration/issues/3
- version: "0.2.0"
  changes:
    - description: >
        Phase 3: replace 7 legacy dashboards with consolidated 5-dashboard suite
        (home, game-perf, system-health, software, engine). Add Fleet filestream
        input support with NDJSON spool-file mode: all 12 data streams now have
        agent/stream/filestream.yml.hbs templates with ndjson parser for tailing
        rigsignal-agent spool files.
      type: enhancement
      link: https://github.com/MathewRJ/RigSignal-Integration/issues/2
- version: "0.1.0"
  changes:
    - description: >
        Initial RigSignal integration package release. Defines 12 data streams
        with ECS-compliant rigsignal.* field mappings, TSDS mode, metric_type/unit
        annotations, per-data-stream ingest pipelines, and Kibana dashboards.
      type: enhancement
      link: https://github.com/MathewRJ/RigSignal-Integration/issues/1
