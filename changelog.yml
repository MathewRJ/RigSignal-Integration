- version: "0.1.4"
  changes:
    - description: >
        Fix game not launching in Steam Gaming Mode (gamescope). The launcher
        now falls back to running gamepulse-agent directly in the background
        when systemctl --user fails (D-Bus absent under gamescope). Also
        resolves the agent binary relative to the launcher script so
        ~/.local/bin does not need to be on PATH in the gamescope session.
      type: bugfix
      link: https://github.com/MathewRJ/GamePulse/issues/1

- version: "0.1.3"
  changes:
    - description: >
        Fix agent startup 403 on Elasticsearch ping. The agent was calling GET /
        (requires cluster:monitor/main) but ingest-only API keys don't have that
        privilege. Ping now uses /_cluster/health, matching the setup test.
        4xx responses are treated as non-fatal so the agent continues to ship
        data even if the health endpoint is restricted.
      type: bugfix
      link: https://github.com/MathewRJ/GamePulse/issues/1

- version: "0.1.2"
  changes:
    - description: >
        Replace system-level installer with user-mode install script.
        Installs gamepulse-agent to ~/.local/bin/ — no root required, survives
        SteamOS and other immutable-OS updates without reinstall.
      type: enhancement
      link: https://github.com/MathewRJ/GamePulse-Integration/issues/1
    - description: >
        Add Steam Deck documentation to README covering user-mode install,
        eBPF caveat, and post-update reinstall steps.
      type: enhancement
      link: https://github.com/MathewRJ/GamePulse-Integration/issues/1

- version: "0.1.1"
  changes:
    - description: >
        Fix Elastic Agent 9.x compatibility: replace logfile input with filestream.
        Filebeat 9.x removed the log input type; switch policy template and events
        data stream to filestream with a proper agent stream template.
      type: bugfix
      link: https://github.com/MathewRJ/GamePulse-Integration/issues/1
    - description: >
        Model eBPF per-thread scheduler metrics as a dedicated TSDB data stream
        instead of nested fields inside aggregate eBPF documents.
      type: enhancement
      link: https://github.com/MathewRJ/GamePulse-Integration/issues/1

- version: "0.1.0"
  changes:
    - description: >
        Initial integration package scaffolding. Defines 11 data streams (10 TSDS metrics,
        1 logs) with ECS-compliant gamepulse.* field mappings, TSDS mode, metric_type/unit
        annotations, and per-data-stream ingest pipelines. Migrated from freestyle ES
        component templates to elastic-package format.
      type: enhancement
      link: https://github.com/MathewRJ/GamePulse/issues/1
